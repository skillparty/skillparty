<text x="50%" y="92" text-anchor="middle" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="url(#asciiGradient)" opacity="0.0" filter="url(#glow)"> \__ \| / /| || || ||  _// _` || '_||  _|| || |  <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="0.3s" fill="freeze"/><animate attributeName="opacity" values="0.85;0.65;0.85" dur="6s" begin="0.3s" repeatCount="indefinite"/></text>
<text x="50%" y="114" text-anchor="middle" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="url(#asciiGradient)" opacity="0.0" filter="url(#glow)"> |___/|_\_\|_||_||_||_|  \__,_||_|   \__| \_, |  <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="0.45s" fill="freeze"/><animate attributeName="opacity" values="0.85;0.65;0.85" dur="6s" begin="0.45s" repeatCount="indefinite"/></text>
<text x="50%" y="136" text-anchor="middle" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="url(#asciiGradient)" opacity="0.0" filter="url(#glow)">                                          |__/   <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="0.6s" fill="freeze"/><animate attributeName="opacity" values="0.85;0.65;0.85" dur="6s" begin="0.6s" repeatCount="indefinite"/></text>

  <rect x="0" y="0" width="680" height="2" fill="#00FF41" opacity="0.08">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 168;0 0" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>