<svg width="680" height="170" viewBox="0 0 680 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="asciiGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF41"/>
      <stop offset="50%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="680" height="170" rx="10" fill="#0A0A0A" stroke="#1B2838" stroke-width="1"/>

<text x="50%" y="48" text-anchor="middle" xml:space="preserve" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="url(#asciiGradient)" opacity="0.0" filter="url(#glow)">  ___  _    _  _  _  ___              _            <animate attributeName="opacity" values="0;0.9" dur="0.4s" begin="0.0s" fill="freeze"/><animate attributeName="opacity" values="0.85;0.65;0.85" dur="6s" begin="0.0s" repeatCount="indefinite"/></text>
