<svg width="500" height="200" viewBox="0 0 500 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="200" rx="8" fill="#0A0A0A" stroke="#1B2838" stroke-width="1"/>
  
  <text x="40" y="30" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#00FFFF" opacity="0.8" filter="url(#glow)">
    sys.status.langs // NEURAL LINK ACTIVE
  </text>
  
  <g>
    
        <g transform="translate(40, 60)">
            <text x="0" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#3178C6" opacity="0.9" filter="url(#glow)">TYPESCRIPT</text>
            <text x="390" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#3178C6" opacity="0.9">45.0%</text>
            <rect x="0" y="8" width="400" height="4" fill="#1b2838" rx="2"/>
            <rect x="0" y="8" width="135" height="4" fill="#3178C6" rx="2" filter="url(#glow)">
            <animate attributeName="width" from="0" to="135" dur="1.4s" begin="0.0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.1, 0.8, 0.3, 1"/>
            </rect>
          <rect x="-90" y="8" width="52" height="4" fill="url(#barShimmer)" opacity="0.35">
            <animate attributeName="x" values="-90;155;-90" dur="4.4s" begin="0.0s" repeatCount="indefinite"/>
          </rect>
          <circle cx="135" cy="10" r="1.9" fill="#FFFFFF" opacity="0" filter="url(#glow)">
            <animate attributeName="opacity" values="0;0.6;0" dur="2.3s" begin="0.0s" repeatCount="indefinite"/>
          </circle>
        </g>
        
        <g transform="translate(40, 85)">
            <text x="0" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#F7DF1E" opacity="0.9" filter="url(#glow)">JAVASCRIPT</text>
            <text x="390" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#F7DF1E" opacity="0.9">25.0%</text>
            <rect x="0" y="8" width="400" height="4" fill="#1b2838" rx="2"/>
            <rect x="0" y="8" width="75" height="4" fill="#F7DF1E" rx="2" filter="url(#glow)">
            <animate attributeName="width" from="0" to="75" dur="1.6s" begin="0.12s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.1, 0.8, 0.3, 1"/>
            </rect>
          <rect x="-90" y="8" width="52" height="4" fill="url(#barShimmer)" opacity="0.35">
            <animate attributeName="x" values="-90;95;-90" dur="4.85s" begin="0.12s" repeatCount="indefinite"/>
          </rect>
          <circle cx="75" cy="10" r="1.9" fill="#FFFFFF" opacity="0" filter="url(#glow)">
            <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" begin="0.12s" repeatCount="indefinite"/>
          </circle>
        </g>
        
        <g transform="translate(40, 110)">
            <text x="0" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#3572A5" opacity="0.9" filter="url(#glow)">PYTHON</text>
            <text x="390" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#3572A5" opacity="0.9">15.0%</text>
            <rect x="0" y="8" width="400" height="4" fill="#1b2838" rx="2"/>
            <rect x="0" y="8" width="45" height="4" fill="#3572A5" rx="2" filter="url(#glow)">
            <animate attributeName="width" from="0" to="45" dur="1.9s" begin="0.24s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.1, 0.8, 0.3, 1"/>
            </rect>
          <rect x="-90" y="8" width="52" height="4" fill="url(#barShimmer)" opacity="0.35">
            <animate attributeName="x" values="-90;65;-90" dur="5.3s" begin="0.24s" repeatCount="indefinite"/>
          </rect>
          <circle cx="45" cy="10" r="1.9" fill="#FFFFFF" opacity="0" filter="url(#glow)">
            <animate attributeName="opacity" values="0;0.6;0" dur="2.8s" begin="0.24s" repeatCount="indefinite"/>
          </circle>
        </g>
        
        <g transform="translate(40, 135)">
