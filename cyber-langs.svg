  <rect x="40" y="50" width="400" height="2" fill="#00FFFF" opacity="0.04">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 108;0 0" dur="7.8s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="40" y="175" width="8" height="8" fill="#FF003C" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="55" y="183" font-family="ui-monospace,Menlo,monospace" font-size="9" fill="#FF003C" opacity="0.8">
    NOW OPERATING: skillparty/skillparty
  </text>
  <text x="300" y="183" font-family="ui-monospace,Menlo,monospace" font-size="9" fill="#F97316" opacity="0.85">
    DATA: SIMULATED
  </text>
</svg>