            <text x="390" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#00B4AB" opacity="0.9">10.0%</text>
            <rect x="0" y="8" width="400" height="4" fill="#1b2838" rx="2"/>
            <rect x="0" y="8" width="30" height="4" fill="#00B4AB" rx="2" filter="url(#glow)">
            <animate attributeName="width" from="0" to="30" dur="2.1s" begin="0.36s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.1, 0.8, 0.3, 1"/>
            </rect>
          <rect x="-90" y="8" width="52" height="4" fill="url(#barShimmer)" opacity="0.35">
            <animate attributeName="x" values="-90;50;-90" dur="5.75s" begin="0.36s" repeatCount="indefinite"/>
          </rect>
          <circle cx="30" cy="10" r="1.9" fill="#FFFFFF" opacity="0" filter="url(#glow)">
            <animate attributeName="opacity" values="0;0.6;0" dur="3.0s" begin="0.36s" repeatCount="indefinite"/>
          </circle>
        </g>
        
        <g transform="translate(40, 160)">
            <text x="0" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#E34C26" opacity="0.9" filter="url(#glow)">HTML</text>
            <text x="390" y="0" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#E34C26" opacity="0.9">5.0%</text>
            <rect x="0" y="8" width="400" height="4" fill="#1b2838" rx="2"/>
            <rect x="0" y="8" width="15" height="4" fill="#E34C26" rx="2" filter="url(#glow)">
            <animate attributeName="width" from="0" to="15" dur="2.4s" begin="0.48s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.1, 0.8, 0.3, 1"/>
            </rect>
          <rect x="-90" y="8" width="52" height="4" fill="url(#barShimmer)" opacity="0.35">
            <animate attributeName="x" values="-90;35;-90" dur="6.2s" begin="0.48s" repeatCount="indefinite"/>
          </rect>
          <circle cx="15" cy="10" r="1.9" fill="#FFFFFF" opacity="0" filter="url(#glow)">
            <animate attributeName="opacity" values="0;0.6;0" dur="3.3s" begin="0.48s" repeatCount="indefinite"/>
